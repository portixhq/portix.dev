<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A one-dimensional barcode symbol printed on a receipt with human-readable text beneath it">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Receipt -->
    <rect x="284" y="120" width="200" height="200" fill="#ffffff"/>
    <rect x="284" y="120" width="200" height="16" fill="#e5e5e5"/>
    <line x1="302" y1="152" x2="466" y2="152" stroke="#a3a3a3" stroke-width="1.8"/>
    <line x1="302" y1="166" x2="420" y2="166" stroke="#a3a3a3" stroke-width="1.8"/>

    <!-- Barcode bars -->
    <g transform="translate(310,196)" fill="#171717">
      <rect x="0" y="0" width="3" height="70"/>
      <rect x="6" y="0" width="1" height="70"/>
      <rect x="10" y="0" width="4" height="70"/>
      <rect x="17" y="0" width="2" height="70"/>
      <rect x="22" y="0" width="1" height="70"/>
      <rect x="26" y="0" width="5" height="70"/>
      <rect x="34" y="0" width="2" height="70"/>
      <rect x="39" y="0" width="1" height="70"/>
      <rect x="43" y="0" width="4" height="70"/>
      <rect x="50" y="0" width="1" height="70"/>
      <rect x="54" y="0" width="3" height="70"/>
      <rect x="60" y="0" width="2" height="70"/>
      <rect x="65" y="0" width="5" height="70"/>
      <rect x="73" y="0" width="1" height="70"/>
      <rect x="77" y="0" width="3" height="70"/>
      <rect x="83" y="0" width="2" height="70"/>
      <rect x="88" y="0" width="1" height="70"/>
      <rect x="92" y="0" width="4" height="70"/>
      <rect x="99" y="0" width="2" height="70"/>
      <rect x="104" y="0" width="1" height="70"/>
      <rect x="108" y="0" width="3" height="70"/>
      <rect x="114" y="0" width="1" height="70"/>
      <rect x="118" y="0" width="4" height="70"/>
      <rect x="125" y="0" width="2" height="70"/>
      <rect x="130" y="0" width="1" height="70"/>
      <rect x="134" y="0" width="3" height="70"/>
      <rect x="140" y="0" width="4" height="70"/>
    </g>

    <text x="384" y="284" text-anchor="middle" font-size="12" fill="#171717" letter-spacing="2">0 12345 67890</text>

    <line x1="302" y1="298" x2="360" y2="298" stroke="#171717" stroke-width="2.4"/>

    <text x="384" y="102" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">1D BARCODE</text>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
