<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A JavaScript receipt model being rendered and printed as a physical receipt">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- JS object -->
    <g transform="translate(110,150)">
      <rect x="0" y="0" width="120" height="110" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="60" y="42" text-anchor="middle" font-size="18" fill="#b9d9fb">{ }</text>
      <text x="60" y="64" text-anchor="middle" font-size="9" fill="#525252">receipt</text>
      <text x="60" y="78" text-anchor="middle" font-size="9" fill="#525252">total: 7.56</text>
      <text x="60" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">RECEIPT MODEL</text>
    </g>

    <path d="M242 205 L292 205" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M284 199 L294 205 L284 211" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(304,168)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>

    <path d="M416 210 L416 232" stroke="#525252" stroke-width="1.2"/>

    <!-- Printed receipt -->
    <rect x="356" y="232" width="120" height="130" fill="#ffffff"/>
    <rect x="356" y="232" width="120" height="14" fill="#e5e5e5"/>
    <line x1="368" y1="262" x2="464" y2="262" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="368" y1="276" x2="440" y2="276" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="368" y1="290" x2="464" y2="290" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="368" y1="310" x2="464" y2="310" stroke="#171717" stroke-width="2.2"/>
    <text x="416" y="332" text-anchor="middle" font-size="10" fill="#171717">TOTAL $7.56</text>

    <text x="416" y="220" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">RECEIPT</text>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
