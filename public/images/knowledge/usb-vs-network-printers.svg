<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparison between USB printers and network printers">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>
  <g font-family="'JetBrains Mono', monospace">
    <line x1="384" y1="130" x2="384" y2="330" stroke="#262629" stroke-width="1.4" stroke-dasharray="3 6"/>
    <circle cx="384" cy="230" r="24" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
    <text x="384" y="235" text-anchor="middle" font-size="12" fill="#b9d9fb" letter-spacing="1">VS</text>

    <g transform="translate(150,150)">
      <rect x="0" y="0" width="150" height="160" rx="10" fill="#0a0a0a" stroke="#262629" stroke-width="1.6"/>
      <g transform="translate(60,68)">
        <rect x="0" y="-8" width="30" height="16" rx="2" fill="none" stroke="#a3a3a3" stroke-width="1.6"/>
        <line x1="8" y1="-8" x2="8" y2="-16" stroke="#a3a3a3" stroke-width="1.6"/>
        <line x1="22" y1="-8" x2="22" y2="-16" stroke="#a3a3a3" stroke-width="1.6"/>
      </g>
      <text x="75" y="-14" text-anchor="middle" font-size="12" fill="#e5e5e5" letter-spacing="1">USB</text>
    </g>

    <g transform="translate(468,150)">
      <rect x="0" y="0" width="150" height="160" rx="10" fill="#0a0a0a" stroke="#262629" stroke-width="1.6"/>
      <circle cx="75" cy="72" r="14" fill="none" stroke="#a3a3a3" stroke-width="1.5"/>
      <circle cx="42" cy="46" r="7" fill="none" stroke="#525252" stroke-width="1.3"/>
      <circle cx="108" cy="46" r="7" fill="none" stroke="#525252" stroke-width="1.3"/>
      <circle cx="42" cy="98" r="7" fill="none" stroke="#525252" stroke-width="1.3"/>
      <circle cx="108" cy="98" r="7" fill="none" stroke="#525252" stroke-width="1.3"/>
      <line x1="75" y1="72" x2="42" y2="46" stroke="#262629" stroke-width="1.1"/>
      <line x1="75" y1="72" x2="108" y2="46" stroke="#262629" stroke-width="1.1"/>
      <line x1="75" y1="72" x2="42" y2="98" stroke="#262629" stroke-width="1.1"/>
      <line x1="75" y1="72" x2="108" y2="98" stroke="#262629" stroke-width="1.1"/>
      <text x="75" y="-14" text-anchor="middle" font-size="12" fill="#e5e5e5" letter-spacing="1">NETWORK</text>
    </g>
  </g>
  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
