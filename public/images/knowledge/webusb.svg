<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A website requesting permission to claim a USB interface and transfer data to a compatible printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(96,166)">
      <rect x="0" y="0" width="110" height="80" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="55" y="50" text-anchor="middle" font-size="14" fill="#a3a3a3">&lt;/&gt;</text>
      <text x="55" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">WEB APP</text>
    </g>

    <path d="M218 200 L260 200" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>

    <!-- Permission dialog -->
    <g transform="translate(268,158)">
      <rect x="0" y="0" width="130" height="84" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="65" y="24" text-anchor="middle" font-size="9" fill="#a3a3a3">Select a device</text>
      <rect x="14" y="34" width="102" height="14" rx="3" fill="none" stroke="#b9d9fb" stroke-width="1.3"/>
      <rect x="14" y="52" width="102" height="14" rx="3" fill="none" stroke="#525252" stroke-width="1.2"/>
      <text x="65" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PERMISSION</text>
    </g>

    <path d="M408 200 L458 200" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>

    <!-- USB connector -->
    <g transform="translate(466,192)">
      <rect x="0" y="-8" width="30" height="16" rx="2" fill="none" stroke="#b9d9fb" stroke-width="1.6"/>
      <line x1="8" y1="-8" x2="8" y2="-16" stroke="#b9d9fb" stroke-width="1.6"/>
      <line x1="22" y1="-8" x2="22" y2="-16" stroke="#b9d9fb" stroke-width="1.6"/>
      <circle cx="8" cy="-16" r="2" fill="#b9d9fb"/>
      <circle cx="22" cy="-16" r="2" fill="#b9d9fb"/>
    </g>
    <path d="M498 200 L556 200" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M548 194 L558 200 L548 206" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(568,168)">
      <rect x="0" y="18" width="100" height="42" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="80" height="22" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="84" cy="39" r="3" fill="#b9d9fb"/>
      <rect x="22" y="60" width="56" height="46" fill="#ffffff"/>
      <line x1="30" y1="72" x2="70" y2="72" stroke="#a3a3a3" stroke-width="1.5"/>
      <line x1="30" y1="82" x2="62" y2="82" stroke="#a3a3a3" stroke-width="1.5"/>
      <line x1="30" y1="92" x2="70" y2="92" stroke="#171717" stroke-width="2"/>
      <text x="50" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
