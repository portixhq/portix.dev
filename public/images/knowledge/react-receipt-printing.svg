<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="React application sending a receipt to a thermal printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <!-- Browser / React node -->
  <g transform="translate(120,176)">
    <rect x="0" y="0" width="140" height="80" rx="10" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
    <circle cx="20" cy="18" r="3" fill="#525252"/>
    <circle cx="32" cy="18" r="3" fill="#525252"/>
    <circle cx="44" cy="18" r="3" fill="#525252"/>
    <line x1="16" y1="30" x2="124" y2="30" stroke="#262629" stroke-width="1"/>
    <circle cx="70" cy="55" r="16" fill="none" stroke="#b9d9fb" stroke-width="2"/>
    <ellipse cx="70" cy="55" rx="16" ry="6" fill="none" stroke="#b9d9fb" stroke-width="1.2" opacity="0.7"/>
    <ellipse cx="70" cy="55" rx="16" ry="6" fill="none" stroke="#b9d9fb" stroke-width="1.2" opacity="0.7" transform="rotate(60 70 55)"/>
    <ellipse cx="70" cy="55" rx="16" ry="6" fill="none" stroke="#b9d9fb" stroke-width="1.2" opacity="0.7" transform="rotate(120 70 55)"/>
    <text x="70" y="102" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a3a3a3" letter-spacing="1">REACT APP</text>
  </g>

  <!-- Connector -->
  <g>
    <line x1="270" y1="216" x2="460" y2="216" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M452 210 L462 216 L452 222" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <text x="365" y="200" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#525252" letter-spacing="1">print()</text>
  </g>

  <!-- Printer node -->
  <g transform="translate(470,156)">
    <rect x="0" y="24" width="130" height="56" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
    <rect x="14" y="0" width="102" height="30" rx="4" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
    <circle cx="112" cy="52" r="4" fill="#b9d9fb"/>
    <!-- receipt paper -->
    <rect x="30" y="80" width="70" height="70" fill="#ffffff"/>
    <line x1="38" y1="92" x2="92" y2="92" stroke="#a3a3a3" stroke-width="2"/>
    <line x1="38" y1="102" x2="86" y2="102" stroke="#a3a3a3" stroke-width="2"/>
    <line x1="38" y1="112" x2="92" y2="112" stroke="#a3a3a3" stroke-width="2"/>
    <line x1="38" y1="122" x2="78" y2="122" stroke="#a3a3a3" stroke-width="2"/>
    <line x1="38" y1="136" x2="92" y2="136" stroke="#171717" stroke-width="3"/>
    <text x="65" y="112" font-family="'JetBrains Mono', monospace"></text>
    <text x="65" y="-10" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a3a3a3" letter-spacing="1">THERMAL PRINTER</text>
  </g>

  <text x="384" y="380" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
