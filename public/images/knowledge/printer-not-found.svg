<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A printer missing from device discovery, shown as a faded outline">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>
  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(310,168)" opacity="0.4">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="none" stroke="#525252" stroke-width="1.5" stroke-dasharray="4 4"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="none" stroke="#525252" stroke-width="1.5" stroke-dasharray="4 4"/>
    </g>
    <g transform="translate(430,250)">
      <circle cx="0" cy="0" r="26" fill="none" stroke="#c96a6a" stroke-width="2.2"/>
      <line x1="18" y1="18" x2="38" y2="38" stroke="#c96a6a" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="6" text-anchor="middle" font-size="16" fill="#c96a6a">?</text>
    </g>
    <text x="366" y="146" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER NOT FOUND</text>
  </g>
  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
