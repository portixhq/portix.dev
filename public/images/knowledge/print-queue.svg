<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Several print jobs waiting in an ordered queue before reaching a printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Queue -->
    <g transform="translate(170,138)">
      <rect x="0" y="0" width="220" height="150" rx="8" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <rect x="16" y="18" width="188" height="26" rx="4" fill="none" stroke="#a3a3a3" stroke-width="1.4"/>
      <text x="26" y="35" font-size="10" fill="#a3a3a3">job-3 · sending</text>
      <rect x="16" y="52" width="188" height="26" rx="4" fill="none" stroke="#525252" stroke-width="1.4"/>
      <text x="26" y="69" font-size="10" fill="#525252">job-4 · pending</text>
      <rect x="16" y="86" width="188" height="26" rx="4" fill="none" stroke="#525252" stroke-width="1.4"/>
      <text x="26" y="103" font-size="10" fill="#525252">job-5 · pending</text>
      <rect x="16" y="120" width="188" height="26" rx="4" fill="none" stroke="#3a3a3d" stroke-width="1.4" stroke-dasharray="3 3"/>
      <text x="26" y="137" font-size="10" fill="#3a3a3d">job-6 · held</text>
      <text x="110" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">QUEUE</text>
    </g>

    <path d="M394 200 L444 200" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M436 194 L446 200 L436 206" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(454,168)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
