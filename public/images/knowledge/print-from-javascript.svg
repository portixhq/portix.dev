<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JavaScript code calling window.print() to send a prepared document to a printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- JS source -->
    <g transform="translate(120,150)">
      <rect x="0" y="0" width="130" height="110" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="65" y="46" text-anchor="middle" font-size="22" fill="#b9d9fb" font-weight="600">JS</text>
      <text x="65" y="70" text-anchor="middle" font-size="9" fill="#525252">window.print()</text>
      <text x="65" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">SCRIPT</text>
    </g>

    <path d="M262 205 L312 205" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M304 199 L314 205 L304 211" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Print dialog -->
    <g transform="translate(322,158)">
      <rect x="0" y="0" width="130" height="96" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="65" y="26" text-anchor="middle" font-size="10" fill="#a3a3a3">Print</text>
      <rect x="16" y="38" width="98" height="14" rx="3" fill="none" stroke="#525252" stroke-width="1.2"/>
      <rect x="16" y="58" width="46" height="16" rx="3" fill="none" stroke="#a3a3a3" stroke-width="1.2"/>
      <rect x="68" y="58" width="46" height="16" rx="3" fill="none" stroke="#b9d9fb" stroke-width="1.4"/>
      <text x="65" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">BROWSER</text>
    </g>

    <path d="M462 205 L512 205" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M504 199 L514 205 L504 211" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(524,174)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
