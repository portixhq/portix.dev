<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="An immutable receipt model rendered through separate HTML, PDF, and ESC/POS renderers">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>
  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(80,166)">
      <rect x="0" y="0" width="110" height="80" rx="8" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <text x="55" y="40" text-anchor="middle" font-size="16" fill="#b9d9fb">{ }</text>
      <text x="55" y="60" text-anchor="middle" font-size="9" fill="#525252">frozen model</text>
      <text x="55" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">RECEIPT MODEL</text>
    </g>

    <path d="M202 186 L262 150" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>
    <path d="M202 206 L262 206" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>
    <path d="M202 226 L262 262" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>

    <g transform="translate(270,120)">
      <rect x="0" y="0" width="90" height="46" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="45" y="28" text-anchor="middle" font-size="10" fill="#a3a3a3">HTML</text>
    </g>
    <g transform="translate(270,183)">
      <rect x="0" y="0" width="90" height="46" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="45" y="28" text-anchor="middle" font-size="10" fill="#a3a3a3">PDF</text>
    </g>
    <g transform="translate(270,246)">
      <rect x="0" y="0" width="90" height="46" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="45" y="28" text-anchor="middle" font-size="10" fill="#a3a3a3">ESC/POS</text>
    </g>

    <path d="M360 143 L470 205" stroke="#525252" stroke-width="1.2" stroke-dasharray="2 4" opacity="0.6"/>
    <path d="M360 206 L470 206" stroke="#b9d9fb" stroke-width="1.4" stroke-dasharray="3 4"/>
    <path d="M462 200 L472 206 L462 212" fill="none" stroke="#b9d9fb" stroke-width="1.4"/>
    <path d="M360 269 L470 207" stroke="#525252" stroke-width="1.2" stroke-dasharray="2 4" opacity="0.6"/>

    <g transform="translate(480,174)">
