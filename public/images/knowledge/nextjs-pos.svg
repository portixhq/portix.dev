<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A Next.js server sale mutation handing a stable receipt job to a client print adapter">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>
  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(96,150)">
      <rect x="0" y="0" width="130" height="110" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="65" y="50" text-anchor="middle" font-size="15" fill="#a3a3a3" font-weight="600">Next.js</text>
      <text x="65" y="70" text-anchor="middle" font-size="9" fill="#525252">completeSale()</text>
      <text x="65" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">SERVER</text>
    </g>
    <path d="M238 205 L286 205" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M278 199 L288 205 L278 211" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <g transform="translate(296,150)">
      <rect x="0" y="0" width="130" height="110" rx="8" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <text x="65" y="50" text-anchor="middle" font-size="10" fill="#b9d9fb">"use client"</text>
      <text x="65" y="70" text-anchor="middle" font-size="9" fill="#525252">printAdapter</text>
      <text x="65" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">CLIENT</text>
    </g>
    <path d="M438 205 L488 205" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M480 199 L490 205 L480 211" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <g transform="translate(500,174)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>
  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
