<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A Vue POS component calling window.print() to send a rendered receipt to a printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>
  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(120,150)">
      <rect x="0" y="0" width="130" height="110" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="65" y="52" text-anchor="middle" font-size="22" fill="#b9d9fb" font-weight="600">Vue</text>
      <text x="65" y="72" text-anchor="middle" font-size="9" fill="#525252">printReceipt()</text>
      <text x="65" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">EXAMPLE</text>
    </g>
    <path d="M262 205 L312 205" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M304 199 L314 205 L304 211" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <g transform="translate(324,174)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
    <path d="M380 216 L380 238" stroke="#525252" stroke-width="1.2"/>
    <rect x="330" y="238" width="100" height="120" fill="#ffffff"/>
    <line x1="342" y1="254" x2="418" y2="254" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="342" y1="268" x2="400" y2="268" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="342" y1="290" x2="418" y2="290" stroke="#171717" stroke-width="2.2"/>
    <text x="380" y="226" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">RECEIPT</text>
  </g>
  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
