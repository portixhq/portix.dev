<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A discovered printer being assigned a logical role and paired with the local runtime">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Runtime -->
    <g transform="translate(140,166)">
      <rect x="0" y="0" width="110" height="80" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <g transform="translate(55,40)">
        <path d="M0 -16 L14 -8 L14 8 L0 16 L-14 8 L-14 -8 Z" fill="none" stroke="#a3a3a3" stroke-width="1.4"/>
      </g>
      <text x="55" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">RUNTIME</text>
    </g>

    <path d="M262 206 L306 206" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>

    <!-- Role tag -->
    <g transform="translate(314,182)">
      <rect x="0" y="0" width="120" height="46" rx="6" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.5"/>
      <text x="60" y="29" text-anchor="middle" font-size="10" fill="#b9d9fb">customer-receipt</text>
      <text x="60" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">LOGICAL ROLE</text>
    </g>

    <path d="M446 206 L490 206" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M482 200 L492 206 L482 212" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer with a check mark badge -->
    <g transform="translate(500,168)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <circle cx="98" cy="8" r="12" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <path d="M92 8 L96 12 L104 3" fill="none" stroke="#b9d9fb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
