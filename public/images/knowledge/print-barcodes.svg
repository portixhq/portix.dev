    <text x="394" y="256" text-anchor="middle" font-size="10" fill="#171717" letter-spacing="1">0123456789</text>
    <text x="394" y="136" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTED BARCODE</text>
