      <rect x="50" y="0" width="1" height="60"/>
      <rect x="54" y="0" width="3" height="60"/>
      <rect x="60" y="0" width="2" height="60"/>
      <rect x="65" y="0" width="5" height="60"/>
      <rect x="73" y="0" width="1" height="60"/>
