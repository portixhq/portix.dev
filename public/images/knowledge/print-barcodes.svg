<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JavaScript-validated barcode data being encoded and printed as a scannable symbol">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(110,150)">
      <rect x="0" y="0" width="120" height="110" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="60" y="50" text-anchor="middle" font-size="12" fill="#b9d9fb">0123456789</text>
      <text x="60" y="70" text-anchor="middle" font-size="9" fill="#525252">validated data</text>
      <text x="60" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">JS ENCODER</text>
    </g>

    <path d="M242 205 L292 205" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M284 199 L294 205 L284 211" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Receipt with barcode -->
    <rect x="304" y="150" width="180" height="120" fill="#ffffff"/>
    <rect x="304" y="150" width="180" height="14" fill="#e5e5e5"/>
    <g transform="translate(324,178)" fill="#171717">
