<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A document being translated by a print driver into device-ready data for a printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(120,160)">
      <rect x="0" y="0" width="90" height="110" rx="6" fill="#ffffff"/>
      <line x1="16" y1="20" x2="74" y2="20" stroke="#a3a3a3" stroke-width="2"/>
      <line x1="16" y1="34" x2="60" y2="34" stroke="#a3a3a3" stroke-width="2"/>
      <line x1="16" y1="48" x2="74" y2="48" stroke="#a3a3a3" stroke-width="2"/>
      <line x1="16" y1="62" x2="50" y2="62" stroke="#a3a3a3" stroke-width="2"/>
      <text x="45" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">DOCUMENT</text>
    </g>

    <path d="M226 200 L280 200" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M272 194 L282 200 L272 206" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Driver box -->
    <g transform="translate(290,150)">
      <rect x="0" y="0" width="150" height="110" rx="8" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <rect x="20" y="20" width="110" height="16" rx="3" fill="none" stroke="#525252" stroke-width="1.3"/>
      <rect x="20" y="44" width="110" height="16" rx="3" fill="none" stroke="#525252" stroke-width="1.3"/>
      <rect x="20" y="68" width="70" height="16" rx="3" fill="none" stroke="#a3a3a3" stroke-width="1.3"/>
      <text x="75" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">DRIVER</text>
    </g>

    <path d="M446 200 L500 200" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M492 194 L502 200 L492 206" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(510,168)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
