<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A logo image being converted into a one-bit monochrome dot pattern for thermal printing">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Source image -->
    <g transform="translate(150,150)">
      <rect x="0" y="0" width="120" height="120" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="60" cy="50" r="26" fill="none" stroke="#b9d9fb" stroke-width="2"/>
      <path d="M20 96 Q60 66 100 96" fill="none" stroke="#b9d9fb" stroke-width="2"/>
      <text x="60" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">SOURCE</text>
    </g>

    <path d="M280 210 L330 210" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M322 204 L332 210 L322 216" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- 1-bit dot grid -->
    <g transform="translate(340,150)">
      <rect x="0" y="0" width="120" height="120" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <g fill="#e5e5e5">
        <rect x="42" y="18" width="8" height="8"/>
        <rect x="54" y="18" width="8" height="8"/>
        <rect x="66" y="18" width="8" height="8"/>
        <rect x="30" y="30" width="8" height="8"/>
        <rect x="78" y="30" width="8" height="8"/>
        <rect x="24" y="42" width="8" height="8"/>
        <rect x="84" y="42" width="8" height="8"/>
        <rect x="24" y="54" width="8" height="8"/>
        <rect x="84" y="54" width="8" height="8"/>
        <rect x="30" y="66" width="8" height="8"/>
        <rect x="78" y="66" width="8" height="8"/>
        <rect x="18" y="90" width="8" height="8"/>
        <rect x="30" y="84" width="8" height="8"/>
        <rect x="42" y="78" width="8" height="8"/>
        <rect x="54" y="76" width="8" height="8"/>
        <rect x="66" y="78" width="8" height="8"/>
        <rect x="78" y="84" width="8" height="8"/>
        <rect x="90" y="90" width="8" height="8"/>
      </g>
      <text x="60" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">1-BIT DOTS</text>
    </g>

    <path d="M470 210 L520 210" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M512 204 L522 210 L512 216" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printed on receipt -->
    <g transform="translate(530,150)">
      <rect x="0" y="0" width="90" height="120" fill="#ffffff"/>
      <g fill="#171717">
        <rect x="31" y="18" width="6" height="6"/>
        <rect x="40" y="18" width="6" height="6"/>
        <rect x="49" y="18" width="6" height="6"/>
        <rect x="22" y="27" width="6" height="6"/>
        <rect x="58" y="27" width="6" height="6"/>
        <rect x="17" y="36" width="6" height="6"/>
        <rect x="63" y="36" width="6" height="6"/>
        <rect x="17" y="45" width="6" height="6"/>
        <rect x="63" y="45" width="6" height="6"/>
        <rect x="22" y="54" width="6" height="6"/>
        <rect x="58" y="54" width="6" height="6"/>
        <rect x="13" y="72" width="6" height="6"/>
        <rect x="22" y="67" width="6" height="6"/>
        <rect x="31" y="63" width="6" height="6"/>
        <rect x="40" y="61" width="6" height="6"/>
        <rect x="49" y="63" width="6" height="6"/>
        <rect x="58" y="67" width="6" height="6"/>
        <rect x="67" y="72" width="6" height="6"/>
      </g>
      <text x="45" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTED</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
