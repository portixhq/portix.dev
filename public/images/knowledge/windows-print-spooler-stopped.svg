<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A stopped print spooler service blocking every queued job">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>
  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(384,206)">
      <circle cx="0" cy="0" r="50" fill="#0a0a0a" stroke="#525252" stroke-width="1.6"/>
      <g stroke="#525252" stroke-width="3" stroke-linecap="round">
        <line x1="0" y1="-50" x2="0" y2="-40"/>
        <line x1="0" y1="50" x2="0" y2="40"/>
        <line x1="-50" y1="0" x2="-40" y2="0"/>
        <line x1="50" y1="0" x2="40" y2="0"/>
        <line x1="-35" y1="-35" x2="-28" y2="-28"/>
        <line x1="35" y1="-35" x2="28" y2="-28"/>
        <line x1="-35" y1="35" x2="-28" y2="28"/>
        <line x1="35" y1="35" x2="28" y2="28"/>
      </g>
      <rect x="-9" y="-16" width="6" height="32" fill="#c96a6a"/>
      <rect x="3" y="-16" width="6" height="32" fill="#c96a6a"/>
      <text x="0" y="-66" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">SPOOLER</text>
      <text x="0" y="82" text-anchor="middle" font-size="10" fill="#c96a6a" letter-spacing="0.5">STOPPED</text>
    </g>
  </g>
  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
