<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The same byte producing different glyphs depending on which character code table is active">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Byte -->
    <rect x="334" y="120" width="100" height="40" rx="6" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.4"/>
    <text x="384" y="146" text-anchor="middle" font-size="16" fill="#b9d9fb">0xE9</text>
    <text x="384" y="106" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">BYTE</text>

    <path d="M354 164 L270 210" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>
    <path d="M414 164 L500 210" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>

    <!-- Correct table -->
    <g transform="translate(190,214)">
      <rect x="0" y="0" width="140" height="70" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="70" y="30" text-anchor="middle" font-size="10" fill="#a3a3a3" letter-spacing="0.5">PC850</text>
      <text x="70" y="54" text-anchor="middle" font-size="20" fill="#e5e5e5">é</text>
    </g>
    <text x="260" y="300" text-anchor="middle" font-size="10" fill="#525252">matching table</text>

    <!-- Wrong table -->
    <g transform="translate(438,214)">
      <rect x="0" y="0" width="140" height="70" rx="8" fill="#0a0a0a" stroke="#c96a6a" stroke-width="1.4"/>
      <text x="70" y="30" text-anchor="middle" font-size="10" fill="#a3a3a3" letter-spacing="0.5">UTF-8 → 1-BYTE</text>
      <text x="70" y="54" text-anchor="middle" font-size="20" fill="#c96a6a">Ã©</text>
    </g>
    <text x="508" y="300" text-anchor="middle" font-size="10" fill="#525252">mismatched table</text>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
