<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Side by side comparison of direct thermal printing on coated media and thermal transfer printing through a ribbon">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <line x1="384" y1="96" x2="384" y2="360" stroke="#262629" stroke-width="1.4" stroke-dasharray="3 6"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Direct thermal panel -->
    <text x="204" y="118" text-anchor="middle" font-size="12" fill="#b9d9fb" letter-spacing="1">DIRECT THERMAL</text>
    <rect x="140" y="150" width="128" height="16" rx="3" fill="#141416" stroke="#262629" stroke-width="1.5"/>
    <line x1="204" y1="166" x2="204" y2="190" stroke="#b9d9fb" stroke-width="1.4"/>
    <rect x="156" y="190" width="96" height="120" fill="#ffffff"/>
    <line x1="168" y1="206" x2="240" y2="206" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="168" y1="220" x2="220" y2="220" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="168" y1="234" x2="240" y2="234" stroke="#171717" stroke-width="2.2"/>
    <text x="204" y="332" text-anchor="middle" font-size="10" fill="#525252">coated media only</text>

    <!-- Thermal transfer panel -->
    <text x="564" y="118" text-anchor="middle" font-size="12" fill="#b9d9fb" letter-spacing="1">THERMAL TRANSFER</text>
    <rect x="500" y="150" width="128" height="16" rx="3" fill="#141416" stroke="#262629" stroke-width="1.5"/>
    <rect x="524" y="170" width="80" height="10" rx="2" fill="#0a0a0a" stroke="#a3a3a3" stroke-width="1.2"/>
    <text x="564" y="178" text-anchor="middle" font-size="8" fill="#a3a3a3" letter-spacing="0.5">RIBBON</text>
    <line x1="564" y1="180" x2="564" y2="190" stroke="#b9d9fb" stroke-width="1.4"/>
    <rect x="516" y="190" width="96" height="120" fill="#ffffff"/>
    <line x1="528" y1="206" x2="600" y2="206" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="528" y1="220" x2="580" y2="220" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="528" y1="234" x2="600" y2="234" stroke="#171717" stroke-width="2.2"/>
    <text x="564" y="332" text-anchor="middle" font-size="10" fill="#525252">media + ribbon</text>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
