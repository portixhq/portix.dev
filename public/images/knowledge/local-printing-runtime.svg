<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A local printing runtime sitting between a web application and a printer, coordinating identity, routing, queue, and status">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Browser -->
    <g transform="translate(70,166)">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="16" cy="16" r="3" fill="#525252"/>
      <circle cx="27" cy="16" r="3" fill="#525252"/>
      <circle cx="38" cy="16" r="3" fill="#525252"/>
      <line x1="0" y1="26" x2="120" y2="26" stroke="#262629" stroke-width="1"/>
      <text x="60" y="62" text-anchor="middle" font-size="16" fill="#a3a3a3">&lt;/&gt;</text>
      <text x="60" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">WEB APP</text>
    </g>

    <path d="M198 206 L246 206" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M238 200 L248 206 L238 212" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Runtime hub -->
    <g transform="translate(256,140)">
      <rect x="0" y="0" width="180" height="140" rx="10" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <g transform="translate(90,42)">
        <path d="M0 -20 L18 -10 L18 10 L0 20 L-18 10 L-18 -10 Z" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
        <path d="M0 -20 L0 0 L18 10 M0 0 L-18 10" fill="none" stroke="#b9d9fb" stroke-width="1"/>
      </g>
      <line x1="20" y1="80" x2="160" y2="80" stroke="#262629" stroke-width="1"/>
      <text x="90" y="98" text-anchor="middle" font-size="9" fill="#a3a3a3" letter-spacing="0.5">auth · routing</text>
      <text x="90" y="112" text-anchor="middle" font-size="9" fill="#a3a3a3" letter-spacing="0.5">queue · status</text>
      <text x="90" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">LOCAL RUNTIME</text>
    </g>

    <path d="M436 206 L484 206" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M476 200 L486 206 L476 212" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(494,168)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="380" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
