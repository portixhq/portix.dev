<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A receipt cut in the middle of its content before printing finished">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>
  <g font-family="'JetBrains Mono', monospace">
    <rect x="324" y="130" width="120" height="80" fill="#ffffff"/>
    <rect x="324" y="130" width="120" height="14" fill="#e5e5e5"/>
    <line x1="336" y1="156" x2="432" y2="156" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="336" y1="172" x2="410" y2="172" stroke="#a3a3a3" stroke-width="1.6"/>
    <path d="M320 214 L448 214" stroke="#c96a6a" stroke-width="2.4" stroke-dasharray="5 4"/>
    <text x="384" y="234" text-anchor="middle" font-size="9" fill="#c96a6a" letter-spacing="0.5">CUT HERE (TOO SOON)</text>
    <rect x="336" y="250" width="96" height="40" fill="#ffffff" opacity="0.35"/>
    <line x1="346" y1="262" x2="416" y2="262" stroke="#a3a3a3" stroke-width="1.6" opacity="0.35"/>
    <line x1="346" y1="276" x2="400" y2="276" stroke="#a3a3a3" stroke-width="1.6" opacity="0.35"/>
    <text x="384" y="116" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">RECEIPT</text>
  </g>
  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
