<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A print job flowing through browser layout, the print dialog, and the operating-system queue to a printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <!-- Pipeline stages -->
  <g font-family="'JetBrains Mono', monospace">
    <!-- Stage 1: Document -->
    <g transform="translate(84,166)">
      <rect x="0" y="0" width="118" height="76" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <line x1="24" y1="20" x2="94" y2="20" stroke="#525252" stroke-width="2"/>
      <line x1="24" y1="34" x2="94" y2="34" stroke="#525252" stroke-width="2"/>
      <line x1="24" y1="48" x2="70" y2="48" stroke="#525252" stroke-width="2"/>
      <text x="59" y="-14" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">DOCUMENT</text>
    </g>

    <path d="M210 204 L262 204" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M254 198 L264 204 L254 210" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Stage 2: Paged layout -->
    <g transform="translate(270,158)">
      <rect x="0" y="0" width="92" height="92" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <rect x="16" y="14" width="60" height="18" rx="2" fill="none" stroke="#b9d9fb" stroke-width="1.2"/>
      <rect x="16" y="38" width="60" height="18" rx="2" fill="none" stroke="#b9d9fb" stroke-width="1.2" opacity="0.6"/>
      <rect x="16" y="62" width="36" height="18" rx="2" fill="none" stroke="#b9d9fb" stroke-width="1.2" opacity="0.3"/>
      <text x="46" y="-14" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PAGES</text>
    </g>

    <path d="M362 204 L414 204" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M406 198 L416 204 L406 210" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Stage 3: OS queue -->
    <g transform="translate(422,158)">
      <rect x="0" y="0" width="92" height="92" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <rect x="18" y="20" width="56" height="14" rx="3" fill="none" stroke="#525252" stroke-width="1.5"/>
      <rect x="18" y="39" width="56" height="14" rx="3" fill="none" stroke="#525252" stroke-width="1.5"/>
      <rect x="18" y="58" width="56" height="14" rx="3" fill="none" stroke="#a3a3a3" stroke-width="1.5"/>
      <text x="46" y="-14" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">QUEUE</text>
    </g>

    <path d="M514 204 L566 204" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M558 198 L568 204 L558 210" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Stage 4: Printer -->
    <g transform="translate(576,168)">
      <rect x="0" y="18" width="100" height="42" rx="5" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="80" height="22" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="84" cy="39" r="3" fill="#b9d9fb"/>
      <rect x="24" y="60" width="52" height="40" fill="#ffffff"/>
      <line x1="30" y1="70" x2="70" y2="70" stroke="#a3a3a3" stroke-width="1.5"/>
      <line x1="30" y1="78" x2="66" y2="78" stroke="#a3a3a3" stroke-width="1.5"/>
      <line x1="30" y1="86" x2="70" y2="86" stroke="#171717" stroke-width="2"/>
      <text x="50" y="-14" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="380" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
