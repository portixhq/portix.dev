<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A website requesting permission to exchange HID input, output, and feature reports with a device">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(110,166)">
      <rect x="0" y="0" width="110" height="80" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="55" y="50" text-anchor="middle" font-size="14" fill="#a3a3a3">&lt;/&gt;</text>
      <text x="55" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">WEB APP</text>
    </g>

    <path d="M232 206 L282 206" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M274 200 L284 206 L274 212" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <text x="257" y="192" text-anchor="middle" font-size="8" fill="#525252">requestDevice</text>

    <!-- HID report structure -->
    <g transform="translate(292,150)">
      <rect x="0" y="0" width="150" height="112" rx="8" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <rect x="16" y="16" width="118" height="18" rx="3" fill="none" stroke="#525252" stroke-width="1.2"/>
      <text x="24" y="29" font-size="8" fill="#a3a3a3">input report</text>
      <rect x="16" y="42" width="118" height="18" rx="3" fill="none" stroke="#525252" stroke-width="1.2"/>
      <text x="24" y="55" font-size="8" fill="#a3a3a3">output report</text>
      <rect x="16" y="68" width="118" height="18" rx="3" fill="none" stroke="#525252" stroke-width="1.2"/>
      <text x="24" y="81" font-size="8" fill="#a3a3a3">feature report</text>
      <text x="75" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">HID DEVICE</text>
    </g>

    <path d="M442 206 L494 206" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M486 200 L496 206 L486 212" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Scanner / scale device -->
    <g transform="translate(506,178)">
      <rect x="0" y="0" width="110" height="60" rx="8" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <circle cx="30" cy="30" r="12" fill="none" stroke="#b9d9fb" stroke-width="1.6"/>
      <rect x="52" y="18" width="46" height="24" rx="3" fill="none" stroke="#a3a3a3" stroke-width="1.2"/>
      <text x="55" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">HID PERIPHERAL</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
