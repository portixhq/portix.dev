<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A button calling window.print() to open the browser print workflow toward a printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Browser window with button -->
    <g transform="translate(120,140)">
      <rect x="0" y="0" width="180" height="130" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="18" cy="18" r="3" fill="#525252"/>
      <circle cx="30" cy="18" r="3" fill="#525252"/>
      <circle cx="42" cy="18" r="3" fill="#525252"/>
      <line x1="0" y1="30" x2="180" y2="30" stroke="#262629" stroke-width="1"/>
      <rect x="40" y="66" width="100" height="34" rx="6" fill="none" stroke="#b9d9fb" stroke-width="1.6"/>
      <text x="90" y="88" text-anchor="middle" font-size="11" fill="#b9d9fb">window.print()</text>
      <text x="90" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">BROWSER</text>
    </g>

    <path d="M312 205 L364 205" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M356 199 L366 205 L356 211" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Print dialog -->
    <g transform="translate(374,150)">
      <rect x="0" y="0" width="140" height="110" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="70" y="26" text-anchor="middle" font-size="10" fill="#a3a3a3">Print</text>
      <rect x="16" y="38" width="108" height="16" rx="3" fill="none" stroke="#525252" stroke-width="1.2"/>
      <rect x="16" y="60" width="108" height="16" rx="3" fill="none" stroke="#525252" stroke-width="1.2"/>
      <rect x="16" y="86" width="46" height="16" rx="3" fill="none" stroke="#a3a3a3" stroke-width="1.2"/>
      <rect x="76" y="86" width="46" height="16" rx="3" fill="none" stroke="#b9d9fb" stroke-width="1.4"/>
      <text x="70" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">USER CONFIRMS</text>
    </g>

    <path d="M524 205 L566 205" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M558 199 L568 205 L558 211" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(576,174)">
      <rect x="0" y="18" width="100" height="42" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="80" height="22" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="84" cy="39" r="3" fill="#b9d9fb"/>
      <rect x="22" y="60" width="56" height="46" fill="#ffffff"/>
      <line x1="30" y1="72" x2="70" y2="72" stroke="#a3a3a3" stroke-width="1.5"/>
      <line x1="30" y1="82" x2="62" y2="82" stroke="#a3a3a3" stroke-width="1.5"/>
      <line x1="30" y1="92" x2="70" y2="92" stroke="#171717" stroke-width="2"/>
      <text x="50" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
