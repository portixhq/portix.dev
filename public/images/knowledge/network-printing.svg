<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A client submitting a job through a network to a printer reachable by IP address">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(120,180)">
      <rect x="0" y="0" width="100" height="70" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="50" y="42" text-anchor="middle" font-size="14" fill="#a3a3a3">&lt;/&gt;</text>
      <text x="50" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">CLIENT</text>
    </g>

    <!-- network nodes -->
    <g transform="translate(340,150)">
      <circle cx="60" cy="60" r="14" fill="none" stroke="#b9d9fb" stroke-width="1.6"/>
      <circle cx="10" cy="20" r="8" fill="none" stroke="#525252" stroke-width="1.4"/>
      <circle cx="110" cy="20" r="8" fill="none" stroke="#525252" stroke-width="1.4"/>
      <circle cx="10" cy="100" r="8" fill="none" stroke="#525252" stroke-width="1.4"/>
      <circle cx="110" cy="100" r="8" fill="none" stroke="#525252" stroke-width="1.4"/>
      <line x1="60" y1="60" x2="10" y2="20" stroke="#262629" stroke-width="1.2"/>
      <line x1="60" y1="60" x2="110" y2="20" stroke="#262629" stroke-width="1.2"/>
      <line x1="60" y1="60" x2="10" y2="100" stroke="#262629" stroke-width="1.2"/>
      <line x1="60" y1="60" x2="110" y2="100" stroke="#262629" stroke-width="1.2"/>
      <text x="60" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">NETWORK</text>
    </g>

    <path d="M226 210 L336 210" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M328 204 L338 210 L328 216" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <path d="M480 210 L520 210" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M512 204 L522 210 L512 216" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(530,178)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
