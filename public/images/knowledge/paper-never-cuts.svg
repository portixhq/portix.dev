<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A receipt hanging uncut from the printer after the job finished">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>
  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(324,130)">
      <rect x="0" y="18" width="120" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="100" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="102" cy="40" r="3.5" fill="#525252"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
    <rect x="334" y="192" width="100" height="130" fill="#ffffff"/>
    <line x1="346" y1="212" x2="422" y2="212" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="346" y1="226" x2="400" y2="226" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="346" y1="240" x2="422" y2="240" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="346" y1="260" x2="422" y2="260" stroke="#171717" stroke-width="2.2"/>
    <path d="M334 192 L434 192" stroke="#c96a6a" stroke-width="1.8" stroke-dasharray="4 4" opacity="0.7"/>
    <text x="460" y="192" font-size="9" fill="#c96a6a">expected cut</text>
  </g>
  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
