<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JavaScript building byte-safe ESC/POS commands and sending them through an authorized transport to a printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Uint8Array bytes -->
    <g transform="translate(96,168)">
      <rect x="0" y="0" width="42" height="30" rx="4" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.4"/>
      <text x="21" y="20" text-anchor="middle" font-size="11" fill="#b9d9fb">1B</text>
      <rect x="48" y="0" width="42" height="30" rx="4" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="69" y="20" text-anchor="middle" font-size="11" fill="#a3a3a3">40</text>
      <rect x="96" y="0" width="42" height="30" rx="4" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="117" y="20" text-anchor="middle" font-size="11" fill="#a3a3a3">61</text>
      <rect x="144" y="0" width="42" height="30" rx="4" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="165" y="20" text-anchor="middle" font-size="11" fill="#a3a3a3">01</text>
      <text x="93" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">Uint8Array</text>
    </g>

    <path d="M300 198 L352 198" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M344 192 L354 198 L344 204" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Authorized transport -->
    <g transform="translate(362,168)">
      <rect x="0" y="0" width="140" height="60" rx="8" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <text x="70" y="26" text-anchor="middle" font-size="9" fill="#a3a3a3">pairing · auth</text>
      <text x="70" y="42" text-anchor="middle" font-size="9" fill="#a3a3a3">idempotency</text>
      <text x="70" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">RUNTIME TRANSPORT</text>
    </g>

    <path d="M502 198 L554 198" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M546 192 L556 198 L546 204" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(566,166)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
