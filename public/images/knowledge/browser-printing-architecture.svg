<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Five stacked layers of browser printing architecture, from the web application down to the physical printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="1">
    <g transform="translate(224,70)">
      <rect x="0" y="0" width="320" height="42" rx="6" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.4"/>
      <text x="160" y="27" text-anchor="middle" fill="#e5e5e5">WEB APPLICATION</text>
    </g>
    <path d="M384 112 L384 130" stroke="#525252" stroke-width="1.4"/>

    <g transform="translate(224,130)">
      <rect x="0" y="0" width="320" height="42" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="160" y="27" text-anchor="middle" fill="#a3a3a3">BROWSER RENDERING</text>
    </g>
    <path d="M384 172 L384 190" stroke="#525252" stroke-width="1.4"/>

    <g transform="translate(224,190)">
      <rect x="0" y="0" width="320" height="42" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="160" y="27" text-anchor="middle" fill="#a3a3a3">PRINT UI (USER-MEDIATED)</text>
    </g>
    <path d="M384 232 L384 250" stroke="#525252" stroke-width="1.4"/>

    <g transform="translate(224,250)">
      <rect x="0" y="0" width="320" height="42" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="160" y="27" text-anchor="middle" fill="#a3a3a3">OS PRINT SUBSYSTEM</text>
    </g>
    <path d="M384 292 L384 310" stroke="#525252" stroke-width="1.4"/>

    <g transform="translate(224,310)">
      <rect x="0" y="0" width="320" height="42" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="160" y="27" text-anchor="middle" fill="#a3a3a3">DRIVER / TRANSPORT / PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
