<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A source image being decoded and converted to a one-bit raster for printing">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(120,150)">
      <rect x="0" y="0" width="110" height="110" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="55" cy="46" r="22" fill="none" stroke="#b9d9fb" stroke-width="2"/>
      <path d="M18 88 Q55 62 92 88" fill="none" stroke="#b9d9fb" stroke-width="2"/>
      <text x="55" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">SOURCE</text>
    </g>

    <path d="M242 205 L292 205" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M284 199 L294 205 L284 211" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <g transform="translate(304,150)">
      <rect x="0" y="0" width="110" height="110" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <g fill="#e5e5e5">
        <rect x="38" y="16" width="8" height="8"/>
        <rect x="50" y="16" width="8" height="8"/>
        <rect x="62" y="16" width="8" height="8"/>
        <rect x="26" y="28" width="8" height="8"/>
        <rect x="74" y="28" width="8" height="8"/>
        <rect x="20" y="40" width="8" height="8"/>
        <rect x="80" y="40" width="8" height="8"/>
        <rect x="20" y="52" width="8" height="8"/>
        <rect x="80" y="52" width="8" height="8"/>
        <rect x="26" y="64" width="8" height="8"/>
        <rect x="74" y="64" width="8" height="8"/>
        <rect x="14" y="86" width="8" height="8"/>
        <rect x="26" y="80" width="8" height="8"/>
        <rect x="38" y="76" width="8" height="8"/>
        <rect x="50" y="74" width="8" height="8"/>
        <rect x="62" y="76" width="8" height="8"/>
        <rect x="74" y="80" width="8" height="8"/>
        <rect x="86" y="86" width="8" height="8"/>
      </g>
      <text x="55" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">1-BIT RASTER</text>
    </g>

    <path d="M424 205 L474 205" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M466 199 L476 205 L466 211" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(486,174)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
