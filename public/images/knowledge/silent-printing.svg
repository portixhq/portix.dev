<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A job routing to an authorized printer without showing an interactive print dialog">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(130,166)">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="60" y="50" text-anchor="middle" font-size="16" fill="#a3a3a3">&lt;/&gt;</text>
      <text x="60" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">AUTHORIZED APP</text>
    </g>

    <!-- crossed-out dialog -->
    <g transform="translate(300,150)" opacity="0.55">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="none" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>
      <text x="60" y="34" text-anchor="middle" font-size="9" fill="#525252">Print?</text>
      <rect x="16" y="48" width="38" height="18" rx="3" fill="none" stroke="#525252" stroke-width="1"/>
      <rect x="66" y="48" width="38" height="18" rx="3" fill="none" stroke="#525252" stroke-width="1"/>
      <line x1="6" y1="6" x2="114" y2="74" stroke="#c96a6a" stroke-width="1.8"/>
      <line x1="114" y1="6" x2="6" y2="74" stroke="#c96a6a" stroke-width="1.8"/>
    </g>

    <path d="M260 206 L560 206" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M552 200 L562 206 L552 212" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <text x="410" y="250" text-anchor="middle" font-size="10" fill="#525252">no dialog · pre-authorized</text>

    <!-- Printer -->
    <g transform="translate(572,174)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
