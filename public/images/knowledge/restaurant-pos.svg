<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A versioned order producing per-station production tickets and a separate guest receipt job">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>
  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(80,166)">
      <rect x="0" y="0" width="110" height="80" rx="8" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <text x="55" y="42" text-anchor="middle" font-size="10" fill="#b9d9fb">order:42</text>
      <text x="55" y="58" text-anchor="middle" font-size="9" fill="#525252">version 2</text>
      <text x="55" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">ORDER</text>
    </g>

    <path d="M202 186 L262 150" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>
    <path d="M202 226 L262 262" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>

    <g transform="translate(270,120)">
      <rect x="0" y="0" width="100" height="46" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="50" y="28" text-anchor="middle" font-size="10" fill="#a3a3a3">kitchen-hot</text>
    </g>
    <g transform="translate(270,246)">
      <rect x="0" y="0" width="100" height="46" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="50" y="28" text-anchor="middle" font-size="10" fill="#a3a3a3">bar</text>
    </g>

    <path d="M370 143 L440 205" stroke="#525252" stroke-width="1.2" stroke-dasharray="2 4" opacity="0.6"/>
    <path d="M370 269 L440 207" stroke="#525252" stroke-width="1.2" stroke-dasharray="2 4" opacity="0.6"/>

    <g transform="translate(450,174)">
      <rect x="0" y="18" width="110" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="90" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="92" cy="40" r="3.5" fill="#b9d9fb"/>
      <text x="55" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">STATION</text>
    </g>
    <path d="M505 216 L505 238" stroke="#525252" stroke-width="1.2"/>
    <rect x="460" y="238" width="90" height="100" fill="#ffffff"/>
    <line x1="472" y1="254" x2="538" y2="254" stroke="#a3a3a3" stroke-width="1.6"/>
    <line x1="472" y1="268" x2="520" y2="268" stroke="#a3a3a3" stroke-width="1.6"/>
    <text x="505" y="226" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">TICKET</text>
  </g>
  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
