      <rect x="10" y="0" width="90" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="92" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="20" y="66" width="40" height="6" fill="#525252"/>
