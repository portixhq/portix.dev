<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A shield over the trust boundary between a browser, the operating system, and a printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Browser -->
    <g transform="translate(96,178)">
      <rect x="0" y="0" width="118" height="70" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="59" y="43" text-anchor="middle" font-size="16" fill="#a3a3a3">&lt;/&gt;</text>
      <text x="59" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">BROWSER</text>
    </g>

    <line x1="214" y1="213" x2="286" y2="213" stroke="#525252" stroke-width="1.4" stroke-dasharray="4 5"/>

    <!-- Shield / trust boundary -->
    <g transform="translate(340,140)">
      <path d="M60 0 L118 22 L118 68 C118 108 92 132 60 148 C28 132 2 108 2 68 L2 22 Z"
            fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.8"/>
      <path d="M38 74 L54 90 L84 54" fill="none" stroke="#b9d9fb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="-14" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">TRUST BOUNDARY</text>
    </g>

    <line x1="464" y1="213" x2="536" y2="213" stroke="#525252" stroke-width="1.4" stroke-dasharray="4 5"/>

    <!-- Printer -->
    <g transform="translate(546,180)">
      <rect x="0" y="18" width="116" height="46" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="12" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="98" cy="41" r="3.5" fill="#b9d9fb"/>
      <rect x="26" y="64" width="64" height="46" fill="#ffffff"/>
      <line x1="34" y1="76" x2="80" y2="76" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="34" y1="86" x2="74" y2="86" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="34" y1="96" x2="80" y2="96" stroke="#171717" stroke-width="2.2"/>
      <text x="58" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="380" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
