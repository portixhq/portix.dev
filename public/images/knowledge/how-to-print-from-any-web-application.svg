<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A hub diagram showing a print architecture decision connected to window.print(), PDF, local runtime, and raw commands">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>
  <g font-family="'JetBrains Mono', monospace">
    <line x1="384" y1="216" x2="200" y2="130" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>
    <line x1="384" y1="216" x2="568" y2="130" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>
    <line x1="384" y1="216" x2="200" y2="302" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>
    <line x1="384" y1="216" x2="568" y2="302" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>

    <g transform="translate(384,216)">
      <circle cx="0" cy="0" r="52" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.8"/>
      <text x="0" y="-6" text-anchor="middle" font-size="8" fill="#b9d9fb">PRINT</text>
      <text x="0" y="10" text-anchor="middle" font-size="8" fill="#b9d9fb">ARCHITECTURE</text>
    </g>

    <g transform="translate(140,100)">
      <rect x="0" y="0" width="120" height="46" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="60" y="28" text-anchor="middle" font-size="10" fill="#a3a3a3">window.print()</text>
    </g>
    <g transform="translate(508,100)">
      <rect x="0" y="0" width="120" height="46" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="60" y="28" text-anchor="middle" font-size="10" fill="#a3a3a3">PDF</text>
    </g>
    <g transform="translate(140,280)">
      <rect x="0" y="0" width="120" height="46" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="60" y="28" text-anchor="middle" font-size="10" fill="#a3a3a3">local runtime</text>
    </g>
    <g transform="translate(508,280)">
      <rect x="0" y="0" width="120" height="46" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="60" y="28" text-anchor="middle" font-size="10" fill="#a3a3a3">raw commands</text>
    </g>
  </g>
  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
