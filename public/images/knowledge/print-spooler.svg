<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A print spooler service coordinating storage, scheduling, and delivery between applications and a printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Two application sources -->
    <g transform="translate(120,130)">
      <rect x="0" y="0" width="80" height="50" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="40" y="31" text-anchor="middle" font-size="10" fill="#a3a3a3">APP A</text>
    </g>
    <g transform="translate(120,230)">
      <rect x="0" y="0" width="80" height="50" rx="6" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="40" y="31" text-anchor="middle" font-size="10" fill="#a3a3a3">APP B</text>
    </g>

    <path d="M204 155 L260 195" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>
    <path d="M204 255 L260 215" stroke="#525252" stroke-width="1.3" stroke-dasharray="3 4"/>

    <!-- Spooler gear -->
    <g transform="translate(340,205)">
      <circle cx="0" cy="0" r="46" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <circle cx="0" cy="0" r="18" fill="none" stroke="#b9d9fb" stroke-width="1.4"/>
      <g stroke="#b9d9fb" stroke-width="3" stroke-linecap="round">
        <line x1="0" y1="-46" x2="0" y2="-36"/>
        <line x1="0" y1="46" x2="0" y2="36"/>
        <line x1="-46" y1="0" x2="-36" y2="0"/>
        <line x1="46" y1="0" x2="36" y2="0"/>
        <line x1="-32" y1="-32" x2="-25" y2="-25"/>
        <line x1="32" y1="-32" x2="25" y2="-25"/>
        <line x1="-32" y1="32" x2="-25" y2="25"/>
        <line x1="32" y1="32" x2="25" y2="25"/>
      </g>
      <text x="0" y="-62" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">SPOOLER</text>
    </g>

    <path d="M394 205 L450 205" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M442 199 L452 205 L442 211" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(460,175)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
