<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparison between window.print() and Portix">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>
  <g font-family="'JetBrains Mono', monospace">
    <line x1="384" y1="130" x2="384" y2="330" stroke="#262629" stroke-width="1.4" stroke-dasharray="3 6"/>
    <circle cx="384" cy="230" r="24" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
    <text x="384" y="235" text-anchor="middle" font-size="12" fill="#b9d9fb" letter-spacing="1">VS</text>

    <g transform="translate(150,150)">
      <rect x="0" y="0" width="150" height="160" rx="10" fill="#0a0a0a" stroke="#262629" stroke-width="1.6"/>
      <text x="75" y="60" text-anchor="middle" font-size="16" fill="#a3a3a3">&lt;/&gt;</text>
      <text x="75" y="82" text-anchor="middle" font-size="9" fill="#525252">window.print()</text>
      <text x="75" y="-14" text-anchor="middle" font-size="12" fill="#e5e5e5" letter-spacing="1">BROWSER API</text>
    </g>

    <g transform="translate(468,150)">
      <rect x="0" y="0" width="150" height="160" rx="10" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.8"/>
      <path d="M75 44 L91 53 L91 71 L75 80 L59 71 L59 53 Z" fill="none" stroke="#b9d9fb" stroke-width="1.6"/>
      <text x="75" y="100" text-anchor="middle" font-size="9" fill="#525252">printing runtime</text>
      <text x="75" y="-14" text-anchor="middle" font-size="12" fill="#b9d9fb" letter-spacing="1">PORTIX</text>
    </g>
  </g>
  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
