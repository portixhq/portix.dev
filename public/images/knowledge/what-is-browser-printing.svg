<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Diagram showing a browser sending a print job through a local runtime to a thermal printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <!-- Browser node -->
  <g transform="translate(58,146)">
    <rect x="0" y="0" width="150" height="112" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="3" fill="#525252"/>
    <circle cx="27" cy="16" r="3" fill="#525252"/>
    <circle cx="38" cy="16" r="3" fill="#525252"/>
    <rect x="52" y="11" width="86" height="10" rx="5" fill="none" stroke="#262629" stroke-width="1"/>
    <line x1="0" y1="28" x2="150" y2="28" stroke="#262629" stroke-width="1"/>
    <text x="75" y="66" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="20" fill="#b9d9fb">&lt;/&gt;</text>
    <text x="75" y="90" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a3a3a3">print()</text>
    <text x="75" y="-12" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a3a3a3" letter-spacing="1">BROWSER</text>
  </g>

  <!-- Connector 1 -->
  <g>
    <line x1="222" y1="196" x2="322" y2="196" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M314 190 L324 196 L314 202" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <text x="272" y="180" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#525252" letter-spacing="0.5">HTTP +</text>
    <text x="272" y="192" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#525252" letter-spacing="0.5">WEBSOCKET</text>
  </g>

  <!-- Local runtime node -->
  <g transform="translate(334,146)">
    <rect x="0" y="0" width="100" height="112" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
    <g transform="translate(50,50)">
      <path d="M0 -18 L16 -9 L16 9 L0 18 L-16 9 L-16 -9 Z" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
      <path d="M0 -18 L0 0 L16 9 M0 0 L-16 9" fill="none" stroke="#b9d9fb" stroke-width="1"/>
    </g>
    <line x1="18" y1="92" x2="82" y2="92" stroke="#262629" stroke-width="1"/>
    <circle cx="74" cy="100" r="2.5" fill="#525252"/>
    <circle cx="64" cy="100" r="2.5" fill="none" stroke="#525252" stroke-width="1"/>
    <text x="50" y="-12" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a3a3a3" letter-spacing="1">LOCAL RUNTIME</text>
    <line x1="50" y1="112" x2="50" y2="132" stroke="#262629" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="50" y="146" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#525252">localhost</text>
    <text x="50" y="158" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#525252">spooler</text>
  </g>

  <!-- Connector 2 -->
  <g>
    <line x1="450" y1="196" x2="550" y2="196" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M542 190 L552 196 L542 202" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <text x="500" y="180" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#525252" letter-spacing="0.5">USB</text>
  </g>

  <!-- Printer node -->
  <g transform="translate(560,146)">
    <rect x="0" y="24" width="130" height="56" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
    <rect x="14" y="0" width="102" height="30" rx="4" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
    <circle cx="112" cy="52" r="4" fill="#b9d9fb"/>
    <rect x="30" y="80" width="70" height="66" fill="#ffffff"/>
    <line x1="38" y1="92" x2="92" y2="92" stroke="#a3a3a3" stroke-width="2"/>
    <line x1="38" y1="102" x2="86" y2="102" stroke="#a3a3a3" stroke-width="2"/>
    <line x1="38" y1="112" x2="92" y2="112" stroke="#a3a3a3" stroke-width="2"/>
    <line x1="38" y1="122" x2="78" y2="122" stroke="#a3a3a3" stroke-width="2"/>
    <line x1="38" y1="132" x2="92" y2="132" stroke="#171717" stroke-width="3"/>
    <text x="65" y="-12" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    <line x1="65" y1="146" x2="65" y2="166" stroke="#262629" stroke-width="1" stroke-dasharray="2 3"/>
    <text x="65" y="180" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#525252">thermal</text>
    <text x="65" y="192" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#525252">printer</text>
  </g>

  <text x="384" y="380" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
