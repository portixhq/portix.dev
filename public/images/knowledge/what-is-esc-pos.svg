<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A byte command stream flowing into a receipt printer to produce a printed receipt">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Byte stream -->
    <g transform="translate(90,150)">
      <rect x="0" y="0" width="46" height="32" rx="4" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.4"/>
      <text x="23" y="21" text-anchor="middle" font-size="12" fill="#b9d9fb">1B</text>
      <rect x="54" y="0" width="46" height="32" rx="4" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="77" y="21" text-anchor="middle" font-size="12" fill="#a3a3a3">40</text>
      <rect x="108" y="0" width="46" height="32" rx="4" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="131" y="21" text-anchor="middle" font-size="12" fill="#a3a3a3">1D</text>
      <rect x="162" y="0" width="46" height="32" rx="4" fill="#0a0a0a" stroke="#262629" stroke-width="1.4"/>
      <text x="185" y="21" text-anchor="middle" font-size="12" fill="#a3a3a3">56</text>
      <text x="104" y="-14" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">COMMAND BYTES</text>
    </g>

    <path d="M310 166 L364 166" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M356 160 L366 166 L356 172" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(374,132)">
      <rect x="0" y="18" width="120" height="46" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="12" y="0" width="96" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="96" cy="41" r="3.5" fill="#b9d9fb"/>
      <text x="60" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>

    <path d="M434 178 L434 200" stroke="#525252" stroke-width="1.4"/>

    <!-- Receipt -->
    <rect x="360" y="200" width="148" height="140" fill="#ffffff"/>
    <rect x="360" y="200" width="148" height="14" fill="#e5e5e5"/>
    <line x1="378" y1="234" x2="490" y2="234" stroke="#a3a3a3" stroke-width="1.8"/>
    <line x1="378" y1="248" x2="460" y2="248" stroke="#a3a3a3" stroke-width="1.8"/>
    <line x1="378" y1="262" x2="490" y2="262" stroke="#a3a3a3" stroke-width="1.8"/>
    <line x1="378" y1="284" x2="490" y2="284" stroke="#171717" stroke-width="2.4"/>
    <g transform="translate(378,300)">
      <rect x="0" y="0" width="8" height="20" fill="#171717"/>
      <rect x="12" y="0" width="4" height="20" fill="#171717"/>
      <rect x="20" y="0" width="8" height="20" fill="#171717"/>
      <rect x="32" y="0" width="6" height="20" fill="#171717"/>
      <rect x="42" y="0" width="8" height="20" fill="#171717"/>
      <rect x="54" y="0" width="4" height="20" fill="#171717"/>
      <rect x="62" y="0" width="8" height="20" fill="#171717"/>
      <rect x="74" y="0" width="6" height="20" fill="#171717"/>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
