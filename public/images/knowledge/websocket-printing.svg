<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A persistent bidirectional WebSocket connection between a browser and a trusted printing service">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(150,166)">
      <rect x="0" y="0" width="130" height="80" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="65" y="50" text-anchor="middle" font-size="16" fill="#a3a3a3">&lt;/&gt;</text>
      <text x="65" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">BROWSER</text>
    </g>

    <path d="M282 190 L470 190" stroke="#b9d9fb" stroke-width="1.5"/>
    <path d="M282 222 L470 222" stroke="#b9d9fb" stroke-width="1.5"/>
    <path d="M292 184 L280 190 L292 196" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <path d="M460 216 L472 222 L460 228" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <text x="376" y="176" text-anchor="middle" font-size="10" fill="#525252" letter-spacing="0.5">wss://</text>

    <g transform="translate(478,150)">
      <rect x="0" y="0" width="140" height="112" rx="8" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <circle cx="70" cy="40" r="14" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
      <path d="M70 26 L70 40 L80 48" stroke="#b9d9fb" stroke-width="1.4" fill="none"/>
      <text x="70" y="76" text-anchor="middle" font-size="9" fill="#a3a3a3">live status</text>
      <text x="70" y="90" text-anchor="middle" font-size="9" fill="#a3a3a3">queue · auth</text>
      <text x="70" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINT SERVICE</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
