<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A web application requesting a trusted connection to the local runtime, approved by the user">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(96,166)">
      <rect x="0" y="0" width="110" height="80" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="55" y="50" text-anchor="middle" font-size="14" fill="#a3a3a3">&lt;/&gt;</text>
      <text x="55" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">WEB APP</text>
    </g>

    <path d="M218 200 L262 200" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>

    <!-- Approval card -->
    <g transform="translate(270,158)">
      <rect x="0" y="0" width="150" height="94" rx="8" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <text x="75" y="24" text-anchor="middle" font-size="10" fill="#a3a3a3">Allow this app to connect?</text>
      <rect x="18" y="38" width="114" height="14" rx="3" fill="none" stroke="#525252" stroke-width="1.2"/>
      <rect x="18" y="58" width="46" height="18" rx="3" fill="none" stroke="#525252" stroke-width="1.2"/>
      <rect x="86" y="58" width="46" height="18" rx="3" fill="none" stroke="#b9d9fb" stroke-width="1.4"/>
      <text x="75" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">USER APPROVAL</text>
    </g>

    <path d="M428 200 L480 200" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M472 194 L482 200 L472 206" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Runtime -->
    <g transform="translate(490,164)">
      <rect x="0" y="0" width="120" height="92" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <g transform="translate(60,46)">
        <path d="M0 -18 L16 -9 L16 9 L0 18 L-16 9 L-16 -9 Z" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
      </g>
      <text x="60" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">RUNTIME</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
