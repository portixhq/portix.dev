<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparison between thermal printers and laser printers">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>
  <g font-family="'JetBrains Mono', monospace">
    <line x1="384" y1="130" x2="384" y2="330" stroke="#262629" stroke-width="1.4" stroke-dasharray="3 6"/>
    <circle cx="384" cy="230" r="24" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
    <text x="384" y="235" text-anchor="middle" font-size="12" fill="#b9d9fb" letter-spacing="1">VS</text>

    <g transform="translate(150,150)">
      <rect x="0" y="0" width="150" height="160" rx="10" fill="#0a0a0a" stroke="#262629" stroke-width="1.6"/>
      <rect x="40" y="52" width="70" height="12" rx="3" fill="#141416" stroke="#a3a3a3" stroke-width="1.3"/>
      <circle cx="45" cy="46" r="2.4" fill="#a3a3a3"/>
      <circle cx="58" cy="46" r="2.4" fill="#a3a3a3"/>
      <circle cx="71" cy="46" r="2.4" fill="#a3a3a3"/>
      <rect x="46" y="74" width="58" height="40" fill="#ffffff"/>
      <text x="75" y="-14" text-anchor="middle" font-size="12" fill="#e5e5e5" letter-spacing="1">THERMAL</text>
    </g>

    <g transform="translate(468,150)">
      <rect x="0" y="0" width="150" height="160" rx="10" fill="#0a0a0a" stroke="#262629" stroke-width="1.6"/>
      <rect x="35" y="50" width="80" height="52" rx="4" fill="#141416" stroke="#a3a3a3" stroke-width="1.3"/>
      <rect x="52" y="106" width="46" height="8" fill="#a3a3a3"/>
      <text x="75" y="-14" text-anchor="middle" font-size="12" fill="#e5e5e5" letter-spacing="1">LASER</text>
    </g>
  </g>
  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
