<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A browser print request reaching a printer, with direct printer control shown as restricted">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <!-- Browser node -->
  <g transform="translate(120,168)" font-family="'JetBrains Mono', monospace">
    <rect x="0" y="0" width="140" height="88" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
    <circle cx="18" cy="16" r="3" fill="#525252"/>
    <circle cx="29" cy="16" r="3" fill="#525252"/>
    <circle cx="40" cy="16" r="3" fill="#525252"/>
    <line x1="0" y1="26" x2="140" y2="26" stroke="#262629" stroke-width="1"/>
    <text x="70" y="60" text-anchor="middle" font-size="18" fill="#b9d9fb">&lt;/&gt;</text>
    <text x="70" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">BROWSER</text>
  </g>

  <!-- Connector, blocked -->
  <g font-family="'JetBrains Mono', monospace">
    <line x1="272" y1="212" x2="470" y2="212" stroke="#525252" stroke-width="1.5" stroke-dasharray="4 5"/>
    <circle cx="384" cy="212" r="22" fill="#0a0a0a" stroke="#c96a6a" stroke-width="1.6"/>
    <line x1="370" y1="198" x2="398" y2="226" stroke="#c96a6a" stroke-width="1.6"/>
    <text x="384" y="252" text-anchor="middle" font-size="10" fill="#c96a6a" letter-spacing="0.5">NO DIRECT CONTROL</text>
  </g>

  <!-- Printer node -->
  <g transform="translate(500,168)" font-family="'JetBrains Mono', monospace">
    <rect x="0" y="20" width="120" height="48" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
    <rect x="12" y="0" width="96" height="26" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
    <circle cx="100" cy="44" r="3.5" fill="#525252"/>
    <rect x="26" y="68" width="66" height="50" fill="#ffffff"/>
    <line x1="34" y1="80" x2="82" y2="80" stroke="#a3a3a3" stroke-width="1.8"/>
    <line x1="34" y1="90" x2="76" y2="90" stroke="#a3a3a3" stroke-width="1.8"/>
    <line x1="34" y1="100" x2="82" y2="100" stroke="#171717" stroke-width="2.4"/>
    <text x="60" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
  </g>

  <text x="384" y="380" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
