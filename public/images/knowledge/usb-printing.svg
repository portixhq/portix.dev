<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A host computer connecting to a printer through a USB cable">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Host -->
    <g transform="translate(130,170)">
      <rect x="0" y="0" width="130" height="80" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <rect x="20" y="16" width="90" height="48" rx="3" fill="none" stroke="#525252" stroke-width="1.3"/>
      <text x="65" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">HOST</text>
    </g>

    <!-- USB connector -->
    <g transform="translate(320,196)">
      <rect x="0" y="-8" width="30" height="16" rx="2" fill="none" stroke="#b9d9fb" stroke-width="1.6"/>
      <line x1="8" y1="-8" x2="8" y2="-16" stroke="#b9d9fb" stroke-width="1.6"/>
      <line x1="22" y1="-8" x2="22" y2="-16" stroke="#b9d9fb" stroke-width="1.6"/>
      <circle cx="8" cy="-16" r="2" fill="#b9d9fb"/>
      <circle cx="22" cy="-16" r="2" fill="#b9d9fb"/>
      <text x="15" y="30" text-anchor="middle" font-size="10" fill="#525252" letter-spacing="0.5">USB</text>
    </g>
    <path d="M260 202 L318 202" stroke="#b9d9fb" stroke-width="1.5"/>
    <path d="M352 202 L420 202" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(430,168)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
