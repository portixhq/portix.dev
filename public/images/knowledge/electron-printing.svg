<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="An Electron main process printing rendered content through the operating system to a printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Renderer -->
    <g transform="translate(110,166)">
      <rect x="0" y="0" width="110" height="80" rx="8" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <text x="55" y="50" text-anchor="middle" font-size="14" fill="#a3a3a3">&lt;/&gt;</text>
      <text x="55" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">RENDERER</text>
    </g>

    <path d="M232 206 L282 206" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M274 200 L284 206 L274 212" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <text x="257" y="192" text-anchor="middle" font-size="9" fill="#525252">IPC</text>

    <!-- Main process orbit icon -->
    <g transform="translate(360,206)">
      <circle cx="0" cy="0" r="8" fill="#b9d9fb"/>
      <ellipse cx="0" cy="0" rx="46" ry="18" fill="none" stroke="#b9d9fb" stroke-width="1.4"/>
      <ellipse cx="0" cy="0" rx="46" ry="18" fill="none" stroke="#b9d9fb" stroke-width="1.4" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="46" ry="18" fill="none" stroke="#b9d9fb" stroke-width="1.4" transform="rotate(120)"/>
      <text x="0" y="-56" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">MAIN PROCESS</text>
    </g>

    <path d="M420 206 L472 206" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M464 200 L474 206 L464 212" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(484,174)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
