<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A browser extension exchanging length-prefixed messages with a registered native host that talks to a printer">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Extension puzzle piece -->
    <g transform="translate(120,170)">
      <path d="M20 0 H70 V16 a10 10 0 0 1 0 20 V52 H0 V32 a10 10 0 0 0 0 -20 V0 H20"
            fill="#0a0a0a" stroke="#262629" stroke-width="1.5" transform="translate(0,10) scale(1.1)"/>
      <text x="45" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">EXTENSION</text>
    </g>

    <path d="M232 202 L284 202" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M276 196 L286 202 L276 208" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>
    <text x="258" y="188" text-anchor="middle" font-size="8" fill="#525252">stdio</text>

    <!-- Native host -->
    <g transform="translate(294,160)">
      <rect x="0" y="0" width="130" height="90" rx="8" fill="#0a0a0a" stroke="#b9d9fb" stroke-width="1.6"/>
      <text x="65" y="42" text-anchor="middle" font-size="10" fill="#a3a3a3">{ }</text>
      <text x="65" y="60" text-anchor="middle" font-size="9" fill="#525252">native host</text>
      <text x="65" y="-12" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">NATIVE PROCESS</text>
    </g>

    <path d="M436 202 L488 202" stroke="#b9d9fb" stroke-width="1.5" stroke-dasharray="4 5"/>
    <path d="M480 196 L490 202 L480 208" fill="none" stroke="#b9d9fb" stroke-width="1.5"/>

    <!-- Printer -->
    <g transform="translate(500,170)">
      <rect x="0" y="18" width="112" height="44" rx="6" fill="#141416" stroke="#262629" stroke-width="1.5"/>
      <rect x="10" y="0" width="92" height="24" rx="3" fill="#0a0a0a" stroke="#262629" stroke-width="1.5"/>
      <circle cx="94" cy="40" r="3.5" fill="#b9d9fb"/>
      <rect x="24" y="62" width="60" height="50" fill="#ffffff"/>
      <line x1="32" y1="74" x2="76" y2="74" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="84" x2="68" y2="84" stroke="#a3a3a3" stroke-width="1.6"/>
      <line x1="32" y1="94" x2="76" y2="94" stroke="#171717" stroke-width="2.2"/>
      <text x="56" y="-10" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">PRINTER</text>
    </g>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
