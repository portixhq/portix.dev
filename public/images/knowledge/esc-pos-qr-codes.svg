<svg viewBox="0 0 768 432" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A QR Code symbol printed on a receipt with its module grid highlighted">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1b1b1e" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="768" height="432" fill="#000000"/>
  <rect width="768" height="432" fill="url(#grid)"/>

  <g font-family="'JetBrains Mono', monospace">
    <!-- Receipt -->
    <rect x="304" y="110" width="160" height="220" fill="#ffffff"/>
    <rect x="304" y="110" width="160" height="16" fill="#e5e5e5"/>
    <line x1="322" y1="146" x2="446" y2="146" stroke="#a3a3a3" stroke-width="1.8"/>
    <line x1="322" y1="160" x2="410" y2="160" stroke="#a3a3a3" stroke-width="1.8"/>

    <!-- QR module grid -->
    <g transform="translate(334,182)">
      <rect x="0" y="0" width="100" height="100" fill="#ffffff" stroke="#262629" stroke-width="1"/>
      <!-- finder patterns -->
      <rect x="6" y="6" width="22" height="22" fill="none" stroke="#171717" stroke-width="4"/>
      <rect x="13" y="13" width="8" height="8" fill="#171717"/>
      <rect x="72" y="6" width="22" height="22" fill="none" stroke="#171717" stroke-width="4"/>
      <rect x="79" y="13" width="8" height="8" fill="#171717"/>
      <rect x="6" y="72" width="22" height="22" fill="none" stroke="#171717" stroke-width="4"/>
      <rect x="13" y="79" width="8" height="8" fill="#171717"/>
      <!-- scattered modules -->
      <g fill="#171717">
        <rect x="40" y="10" width="6" height="6"/>
        <rect x="54" y="10" width="6" height="6"/>
        <rect x="40" y="22" width="6" height="6"/>
        <rect x="60" y="22" width="6" height="6"/>
        <rect x="34" y="40" width="6" height="6"/>
        <rect x="48" y="40" width="6" height="6"/>
        <rect x="62" y="40" width="6" height="6"/>
        <rect x="76" y="40" width="6" height="6"/>
        <rect x="34" y="52" width="6" height="6"/>
        <rect x="56" y="52" width="6" height="6"/>
        <rect x="70" y="52" width="6" height="6"/>
        <rect x="34" y="64" width="6" height="6"/>
        <rect x="48" y="64" width="6" height="6"/>
        <rect x="62" y="64" width="6" height="6"/>
        <rect x="40" y="78" width="6" height="6"/>
        <rect x="54" y="84" width="6" height="6"/>
        <rect x="66" y="78" width="6" height="6"/>
        <rect x="80" y="84" width="6" height="6"/>
      </g>
    </g>

    <line x1="322" y1="298" x2="410" y2="298" stroke="#171717" stroke-width="2.4"/>
    <g transform="translate(322,310)">
      <rect x="0" y="0" width="6" height="14" fill="#171717"/>
      <rect x="10" y="0" width="4" height="14" fill="#171717"/>
      <rect x="18" y="0" width="6" height="14" fill="#171717"/>
      <rect x="28" y="0" width="4" height="14" fill="#171717"/>
    </g>

    <text x="384" y="94" text-anchor="middle" font-size="11" fill="#a3a3a3" letter-spacing="1">QR SYMBOL</text>
  </g>

  <text x="384" y="392" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#525252" letter-spacing="2">PORTIX.ONE / KNOWLEDGE</text>
</svg>
